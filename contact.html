    <!-- Navigation -->
    <nav class="glass-nav-wrap" aria-label="Navigation principale">

            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M14 2H10" />
                        <path d="M10 2v5L4.4 17.1c-.8 1.5.3 3.4 2 3.4h11.2c1.7 0 2.8-1.9 2-3.4L14 7V2z" />
                        <path d="M6.5 13.5h11" />
                    </svg>
                </div>
                <span class="nav-logo-text">Laboratoire Abda-Selka</span>
            </a>

            <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
            </button>

            <div class="nav-menu-content">
                <div class="nav-links">
                    <a href="guide.html" class="nav-link">Guide</a>
                    <a href="domicile.html" class="nav-link">À domicile</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </div>

                <a href="http://abda.bmvie.net" class="nav-cta">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"

    <!-- Mini Hero Section -->
    <section class="hero-section"
        style="min-height: 40vh; background: linear-gradient(135deg, #001d48 0%, #061a33 100%);">
        <div class="container-fluid">
            <div class="hero-content">
                <div class="fade-in-up">
                    <h1 class="hero-title">Contactez-nous</h1>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Content Section -->
    <section class="py-5" style="background-color: #f4f4f7;">
        <div class="container py-5">
            <div class="row g-5">

                <!-- Informations (Gauche) -->
                <div class="col-lg-5 fade-in-up">
                    <div class="info-wrapper bg-white p-4 p-md-5 rounded-4 shadow border-top border-4 h-100"
                        style="border-top-color: #001d48 !important;">
                        <h3 class="h4 fw-bold mb-5" style="color: #001d48;">Nos Coordonnées</h3>

                        <!-- Adresse -->
                        <div class="info-item d-flex align-items-center mb-4">
                            <div class="info-icon me-4 d-flex align-items-center justify-content-center"
                                style="color: #001d48;background-color: rgba(109, 184, 255, 0.1); width: 60px; height: 60px; border-radius: 50%;">
                                <i class="bi bi-geo-alt fs-3"></i>
                            </div>
                            <div>
                                <h4 class="h6 fw-bold mb-1" style="color: #001d48;">Adresse</h4>
                                <p class="text-muted mb-0">70 avenue Ben-boulaid<br>09000, Blida</p>
                            </div>
                        </div>

                        <!-- Téléphone -->
                        <div class="info-item d-flex align-items-center mb-4">
                            <div class="info-icon me-4 d-flex align-items-center justify-content-center"
                                style="color: #001d48;background-color: rgba(109, 184, 255, 0.1); width: 60px; height: 60px; border-radius: 50%;">
                                <i class="bi bi-telephone fs-3"></i>
                            </div>
                            <div>
                                <h4 class="h6 fw-bold mb-1" style="color: #001d48;">Téléphone</h4>
                                <p class="text-muted mb-0">020 49 23 09<br>06 60 61 01 05</p>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="info-item d-flex align-items-center mb-4">
                            <div class="info-icon me-4 d-flex align-items-center justify-content-center"
                                style="color: #001d48; background-color: rgba(109, 184, 255, 0.1); width: 60px; height: 60px; border-radius: 50%;">
                                <i class="bi bi-envelope fs-3"></i>
                            </div>
                            <div>
                                <h4 class="h6 fw-bold mb-1" style="color: #001d48;">Email</h4>
                                <p class="text-muted mb-0">laboratoireabda@hotmail.fr<br><small>Posez-nous vos
                                        questions</small></p>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Carte Google Maps (Droite) -->
                <div class="col-lg-7 fade-in-up" style="animation-delay: 0.2s;">
                    <div class="rounded-4 overflow-hidden shadow h-100"
                        style="min-height: 450px; border: 1px solid #e5e7eb;">
                        <iframe id="map"
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3208.005760771556!2d2.832212794601788!3d36.48157694063525!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128f0d483cc85fef%3A0xfad7cac1999a0b30!2sLaboratoire%20d&#39;analyses%20m%C3%A9dicales%20Dr%20ABDA!5e0!3m2!1sfr!2sdz!4v1633453223832!5m2!1sfr!2sdz"
                            width="100%" height="100%" style="border:0; min-height: 450px;" allowfullscreen=""
                            loading="lazy"></iframe>
                    </div>
                </div>

            </div>
        </div>

    <!-- Footer -->
    <footer class="site-footer">
